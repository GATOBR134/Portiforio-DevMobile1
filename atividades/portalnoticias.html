<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Notícias</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #60b8ff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #3f82ff;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin: 0;
        }

        section {
            padding: 20px;
        }

        
        .principal {
            background-color: rgb(192, 132, 132);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: 0.55ms;

        }

        .principal h2 {
            color: #ececec;
            box-shadow: 0px 4px 10px #534a4a;
            
        }

        
        .noticias-secundarias {
            display: flex;
            gap: 20px;
        }

        .noticia {
            background-color: rgb(253, 253, 253);
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .principal:hover {
            transform: scale(1.05);
            background-color: #555454;
        }

        .noticia:hover {
            transform: scale(1.05);
            background-color: #555454;
        }

        h3 {
            color: #534a4a;
        }

        p {
            
        }
    </style>
</head>

<body>

    <header>
        <h1>🙌🤞🤞 Portal de Notícias</h1>
    </header>

    <section>

        <div class="principal">
            <h2>URGENTE 😩😩😩</h2>
            <p>Diogo não libera cedo. Socorro ajuda ajuda ajudaywefwduywdahfgkjdfgekergwekufeeuqwdukqtegwekydwr</p>
        </div>

        <div class="noticias-secundarias">

            <div class="noticia">
                <h3>Quero ir pra casa 😭</h3>
                <p>Socorro fome, ir embora, aura e ego.</p>
            </div>

            <div class="noticia">
                <h3>Tom Holland aparece novamente</h3>
                <p>Ator do Homem-Aranha vira destaque nas redes.</p>
            </div>

        </div>

    </section>

</body>

</html>
